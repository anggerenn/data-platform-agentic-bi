    title: How to use this dashboard
    hideTitle: false
    content: '## Overview

      This dashboard shows a ranked leaderboard of customers by revenue contribution,
      helping sales teams identify top performers for gamification programs and targeted
      incentives to drive loyalty and continued purchasing.


      ## Questions this answers

      - Which customers are in the top 10 by total revenue and should receive recognition
      rewards?

      - What percentage of their city''s total revenue does each top customer contribute?

      - Which customers operate in multiple cities versus single locations, indicating
      different engagement strategies?

      - How are top customers distributed across different cities to focus sales efforts
      geographically?

      - Which high-revenue customers have the most potential for growth based on their
      city count?


      ## Tips

      - Filter by customer type (single vs. multiple cities) to tailor incentive programs
      - single-city customers may need local engagement while multi-city customers
      could benefit from broader loyalty programs.

      - Use the city contribution percentage to identify customers who dominate their
      local markets versus those with room to grow their share.'
