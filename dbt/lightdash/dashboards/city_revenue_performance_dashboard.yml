  properties:
    title: How to use this dashboard
    hideTitle: false
    content: '## Overview

      This dashboard tracks daily revenue performance across cities to help sales
      managers quickly identify underperforming markets and optimize resource allocation,
      enabling proactive intervention before revenue declines become significant.


      ## Questions this answers

      - Which city had the biggest revenue drop compared to last month?

      - What categories are driving revenue growth in our top-performing cities?

      - Which cities are consistently underperforming across all product categories?

      - How does weekend revenue compare to weekday revenue in specific cities?

      - Which cities show the strongest month-over-month growth in specific categories?


      ## Tips

      - Use the Order Date filter to compare performance between weekdays and weekends,
      as some cities may have different shopping patterns based on day of week

      - Drill down into specific categories when investigating underperforming cities
      to identify whether the issue is isolated to particular product lines or affecting
      all categories'
    hideFrame: false
