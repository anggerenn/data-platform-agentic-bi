services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prefect}
      POSTGRES_DB: prefect
    volumes:
      - ${PREFECT_DB_DATA:-prefect_db_data}:/var/lib/postgresql/data
    networks:
      - data-network
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3.4.25-python3.12
    depends_on:
      - postgres
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${POSTGRES_PASSWORD:-prefect}@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_API_URL: ${SERVICE_URL_PREFECT_SERVER}/api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    command: prefect server start
    expose:
      - "4200"
    networks:
      - data-network
    restart: unless-stopped

  prefect-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.prefect
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
      ANALYTICS_PIPELINES_DIR: "/data/pipelines"
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: 5432
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME:-analytics}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER:-analytics}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      LIGHTDASH_INTERNAL_URL: "http://lightdash:8080"
      LIGHTDASH_API_KEY: ${LIGHTDASH_API_KEY}
      GIT_AUTHOR_NAME: "Lightdash Sync"
      GIT_AUTHOR_EMAIL: "sync@data-platform"
      GIT_COMMITTER_NAME: "Lightdash Sync"
      GIT_COMMITTER_EMAIL: "sync@data-platform"
    volumes:
      - ${PIPELINES_DATA:-pipelines_data}:/data/pipelines
      - ./dbt:/opt/prefect/dbt
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - data-network
    restart: unless-stopped

  analytics-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${ANALYTICS_DB_USER:-analytics}
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${ANALYTICS_DB_NAME:-analytics}
      ANALYTICS_DB_READONLY_PASSWORD: ${ANALYTICS_DB_READONLY_PASSWORD:-changeme_readonly}
    volumes:
      - ${ANALYTICS_DB_DATA:-analytics_db_data}:/var/lib/postgresql/data
      - ./docker/analytics-db-init:/docker-entrypoint-initdb.d
    networks:
      - data-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ${MINIO_DATA:-minio_data}:/data
    command: server /data --console-address ":9001"
    networks:
      - data-network
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/lightdash
      "
    networks:
      - data-network
    restart: "no"

  lightdash-db:
    image: postgres:15
    environment:
      POSTGRES_USER: lightdash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prefect}
      POSTGRES_DB: lightdash
    volumes:
      - ${LIGHTDASH_DB_DATA:-lightdash_db_data}:/var/lib/postgresql/data
    networks:
      - data-network
    restart: unless-stopped

  lightdash:
    image: lightdash/lightdash:0.2473.1
    platform: linux/amd64
    depends_on:
      lightdash-db:
        condition: service_started
      analytics-db:
        condition: service_started
    environment:
      - PGHOST=lightdash-db
      - PGPORT=5432
      - PGUSER=lightdash
      - PGPASSWORD=${POSTGRES_PASSWORD:-prefect}
      - PGDATABASE=lightdash
      - LIGHTDASH_SECRET=${LIGHTDASH_SECRET:-changeme}
      - LIGHTDASH_SECURE_COOKIES=false
      - DBT_PROJECT_DIR=/usr/app/dbt
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=lightdash
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_FORCE_PATH_STYLE=true
      - NODE_OPTIONS=--max-old-space-size=640
    volumes:
      - ./dbt:/usr/app/dbt
    networks:
      - data-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Runs dlt ingestion + dbt transformation on first boot
  pipeline-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.prefect
    depends_on:
      prefect-server:
        condition: service_healthy
      analytics-db:
        condition: service_started
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
      ANALYTICS_PIPELINES_DIR: "/data/pipelines"
      ANALYTICS_DB_HOST: analytics-db
      ANALYTICS_DB_PORT: 5432
      ANALYTICS_DB_NAME: ${ANALYTICS_DB_NAME:-analytics}
      ANALYTICS_DB_USER: ${ANALYTICS_DB_USER:-analytics}
      ANALYTICS_DB_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      DBT_PROJECT_DIR: /opt/prefect/dbt
    volumes:
      - ${PIPELINES_DATA:-pipelines_data}:/data
      - ./dbt:/opt/prefect/dbt:ro
    command: sh -c "python /opt/prefect/prefect/flows/main_pipeline.py || echo 'pipeline-init failed — check logs above'; exit 0"
    networks:
      - data-network
    restart: "no"

  # One-time first-boot: registers Lightdash admin user, creates PAT, deploys dbt models.
  # On subsequent deploys: re-runs lightdash deploy + upload to sync dbt/yml changes.
  lightdash-deploy:
    build:
      context: .
      dockerfile: docker/Dockerfile.lightdash-deploy
    working_dir: /dbt
    depends_on:
      lightdash:
        condition: service_healthy
    environment:
      - ANALYTICS_DB_HOST=analytics-db
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME:-analytics}
      - ANALYTICS_DB_USER=bi_readonly
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_READONLY_PASSWORD}
      - LIGHTDASH_URL=http://lightdash:8080
      - LIGHTDASH_EMAIL=${LIGHTDASH_EMAIL}
      - LIGHTDASH_PASSWORD=${LIGHTDASH_PASSWORD}
      - LIGHTDASH_API_KEY=${LIGHTDASH_API_KEY}
      - CI=true
    volumes:
      - ./dbt:/dbt
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml
    networks:
      - data-network
    restart: "no"

  vanna:
    build:
      context: .
      dockerfile: docker/Dockerfile.vanna
    environment:
      - ANALYTICS_DB_HOST=analytics-db
      - ANALYTICS_DB_PORT=5432
      - ANALYTICS_DB_NAME=${ANALYTICS_DB_NAME:-analytics}
      - ANALYTICS_DB_USER=bi_readonly
      - ANALYTICS_DB_PASSWORD=${ANALYTICS_DB_READONLY_PASSWORD}
      - ANALYTICS_DB_ADMIN_USER=${ANALYTICS_DB_USER:-analytics}
      - ANALYTICS_DB_ADMIN_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - LIGHTDASH_PUBLIC_URL=${LIGHTDASH_PUBLIC_URL:-http://localhost:8080}
      - LIGHTDASH_INTERNAL_URL=http://lightdash:8080
      - LIGHTDASH_API_KEY=${LIGHTDASH_API_KEY}
      - LIGHTDASH_EMAIL=${LIGHTDASH_EMAIL}
      - LIGHTDASH_PASSWORD=${LIGHTDASH_PASSWORD}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VANNA_MODEL=${VANNA_MODEL:-deepseek-chat}
      - CHROMA_PATH=/data/vanna-chroma
    volumes:
      - ${VANNA_DATA:-vanna_data}:/data
      - ${CHROMA_CACHE:-chroma_cache_data}:/root/.cache/chroma
      - ./dbt:/dbt
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - data-network
    restart: unless-stopped

  # Runs smoke test after pipeline + lightdash-deploy complete
  smoke-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.vanna
    depends_on:
      pipeline-init:
        condition: service_completed_successfully
      lightdash-deploy:
        condition: service_completed_successfully
      vanna:
        condition: service_started
    command: python /app/smoke_test.py --url http://vanna:8084
    networks:
      - data-network
    restart: "no"

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    depends_on:
      lightdash:
        condition: service_healthy
      vanna:
        condition: service_started
    networks:
      - data-network
    restart: unless-stopped

volumes:
  prefect_db_data:
  analytics_db_data:
  lightdash_db_data:
  minio_data:
  pipelines_data:
  vanna_data:
  chroma_cache_data:

networks:
  data-network:
    driver: bridge
