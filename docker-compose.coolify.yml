services:
  analytics-db:
    exclude_from_hc: true
    volumes:
      - /data/analytics-db:/var/lib/postgresql/data

  lightdash-db:
    exclude_from_hc: true
    volumes:
      - /data/lightdash-db:/var/lib/postgresql/data

  postgres:
    exclude_from_hc: true
    volumes:
      - /data/prefect-db:/var/lib/postgresql/data

  minio:
    exclude_from_hc: true
    volumes:
      - /data/minio:/data

  lightdash:
    platform: linux/amd64

  lightdash-deploy:
    exclude_from_hc: true

  pipeline-init:
    exclude_from_hc: true

  prefect-worker:
    exclude_from_hc: true
    volumes:
      - /data/pipelines:/data/pipelines

  vanna:
    exclude_from_hc: true
    volumes:
      - /data/vanna:/data
      - ./dbt:/dbt:ro
      - /var/run/docker.sock:/var/run/docker.sock
