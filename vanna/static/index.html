<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js" charset="utf-8"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Lightdash iframe ─────────────────────────────────── */
    #lightdash-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Widget root ──────────────────────────────────────── */
    #widget {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* ── Chat panel ───────────────────────────────────────── */
    #chat-panel {
      display: none;
      flex-direction: column;
      width: 380px;
      height: 540px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      margin-bottom: 12px;
      overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    .panel-header {
      background: #7262ff;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .panel-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 2px;
    }

    /* ── Messages ─────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 92%;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #7262ff;
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #f3f3f6;
      color: #222;
      border-bottom-left-radius: 3px;
    }

    /* ── SQL toggle ───────────────────────────────────────── */
    .sql-toggle {
      margin-top: 8px;
      background: none;
      border: none;
      color: #7262ff;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }
    .sql-code {
      display: none;
      margin-top: 5px;
      background: #f7f7fb;
      border: 1px solid #e0e0e8;
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #333;
      max-height: 120px;
      overflow-y: auto;
    }

    /* ── Data table ───────────────────────────────────────── */
    .data-table-wrap {
      margin-top: 8px;
      border: 1px solid #e8e8ee;
      border-radius: 6px;
      overflow: auto;
      max-height: 150px;
    }
    .data-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 11.5px;
    }
    .data-table th {
      background: #f5f5fa;
      padding: 5px 10px;
      text-align: left;
      border-bottom: 1px solid #e0e0e8;
      white-space: nowrap;
      font-weight: 600;
      color: #555;
    }
    .data-table td {
      padding: 4px 10px;
      border-bottom: 1px solid #f0f0f5;
      white-space: nowrap;
      color: #333;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }

    .row-count {
      margin-top: 5px;
      font-size: 11px;
      color: #999;
    }

    /* ── Chart ────────────────────────────────────────────── */
    .chart-wrap {
      margin-top: 8px;
      border: 1px solid #e8e8ee;
      border-radius: 6px;
      overflow: hidden;
      background: #fafafa;
      width: 100%;
    }

    /* ── CSV export ───────────────────────────────────────── */
    .csv-btn {
      margin-top: 6px;
      display: inline-block;
      background: none;
      border: 1px solid #7262ff;
      color: #7262ff;
      font-size: 11px;
      border-radius: 5px;
      padding: 3px 9px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .csv-btn:hover { background: #f0eeff; }

    /* ── Feedback buttons ─────────────────────────────────── */
    .feedback-wrap {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      align-items: center;
    }
    .feedback-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      color: #666;
    }
    .feedback-btn:hover { background: #f5f5f5; border-color: #bbb; }
    .feedback-btn:disabled { opacity: 0.45; cursor: default; }
    .feedback-label { font-size: 11px; color: #aaa; }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 2px 4px;
    }
    .typing-wrap span {
      width: 7px;
      height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .typing-wrap span:nth-child(2) { animation-delay: 0.18s; }
    .typing-wrap span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Input area ───────────────────────────────────────── */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #ebebf0;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      padding: 8px 11px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #7262ff; }
    #user-input:disabled { background: #f5f5f5; }

    #send-btn {
      background: #7262ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #send-btn:disabled { opacity: 0.45; cursor: default; }

    #stop-btn {
      display: none;
      background: #ff4d4d;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #stop-btn:hover { background: #e03e3e; }

    .panel-header button {
      background: none;
      border: none;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 4px;
      opacity: 0.85;
      border-radius: 4px;
    }
    .panel-header button:hover { opacity: 1; background: rgba(255,255,255,0.15); }

    /* ── Side-panel mode (right) ──────────────────────────── */
    body.side-panel #lightdash-frame {
      width: calc(100% - 420px);
    }
    body.side-panel #widget {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: auto;
      width: 420px;
      height: 100vh;
      align-items: stretch;
    }
    body.side-panel #chat-panel {
      display: flex !important;
      width: 420px;
      height: 100vh;
      border-radius: 0;
      margin-bottom: 0;
      box-shadow: -2px 0 16px rgba(0,0,0,0.12);
    }
    body.side-panel #chat-btn { display: none; }

    /* ── Floating button ──────────────────────────────────── */
    #chat-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #7262ff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(114, 98, 255, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #chat-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(114, 98, 255, 0.55);
    }
    #chat-btn svg { pointer-events: none; }
  </style>
</head>
<body>

<iframe id="lightdash-frame" src="{{LIGHTDASH_URL}}" allowfullscreen></iframe>

<div id="widget">
  <div id="chat-panel">
    <div class="panel-header">
      <span>✦ Ask your data</span>
      <div style="display:flex;gap:2px;align-items:center">
        <button id="expand-btn" onclick="toggleSidePanel()" title="Expand to side panel">
          <svg id="expand-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <polyline points="8,1 12,1 12,5"/><line x1="12" y1="1" x2="7" y2="6"/>
            <polyline points="5,12 1,12 1,8"/><line x1="1" y1="12" x2="6" y2="7"/>
          </svg>
        </button>
        <button id="close-btn" onclick="togglePanel()" title="Close">&#x2715;</button>
      </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <input id="user-input" type="text" placeholder="Ask a question…"
             onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }">
      <button id="send-btn" onclick="sendMessage()">Send</button>
      <button id="stop-btn" onclick="stopRequest()">■ Stop</button>
    </div>
  </div>

  <button id="chat-btn" onclick="togglePanel()" title="Ask your data">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<script>
  let sessionId = null;  // server-side session — only the ID is held client-side
  let isOpen = false;
  let isSidePanel = false;
  let exchangeCount = 0;
  const MAX_EXCHANGES = 20;
  let currentAbort = null;

  function togglePanel() {
    if (isSidePanel) return; // side panel handles its own close
    isOpen = !isOpen;
    document.getElementById('chat-panel').classList.toggle('open', isOpen);
    if (isOpen) document.getElementById('user-input').focus();
  }

  function toggleSidePanel() {
    isSidePanel = !isSidePanel;
    document.body.classList.toggle('side-panel', isSidePanel);
    // Swap SVG: collapse arrows when in side panel, expand arrows when popup
    document.getElementById('expand-icon').innerHTML = isSidePanel
      ? '<polyline points="1,6 1,1 6,1"/><line x1="1" y1="1" x2="6" y2="6"/><polyline points="12,7 12,12 7,12"/><line x1="12" y1="12" x2="7" y2="7"/>'
      : '<polyline points="8,1 12,1 12,5"/><line x1="12" y1="1" x2="7" y2="6"/><polyline points="5,12 1,12 1,8"/><line x1="1" y1="12" x2="6" y2="7"/>';
    document.getElementById('expand-btn').title = isSidePanel ? 'Back to popup' : 'Expand to side panel';
    document.getElementById('close-btn').style.display = isSidePanel ? 'none' : '';
    if (isSidePanel) {
      // Force panel open in side mode
      document.getElementById('chat-panel').classList.add('open');
      isOpen = true;
      document.getElementById('user-input').focus();
    }
  }

  // ── DOM helpers ──────────────────────────────────────────

  function scrollToBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function appendMessage(role, contentEl) {
    const bubble = document.createElement('div');
    bubble.className = `msg ${role}`;
    if (typeof contentEl === 'string') {
      bubble.textContent = contentEl;
    } else {
      bubble.appendChild(contentEl);
    }
    document.getElementById('messages').appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const bubble = document.createElement('div');
    bubble.className = 'msg assistant';
    bubble.id = 'typing-bubble';
    bubble.innerHTML = '<div class="typing-wrap"><span></span><span></span><span></span></div>';
    document.getElementById('messages').appendChild(bubble);
    scrollToBottom();
    return bubble;
  }

  // ── Strip fenced code blocks and markdown tables from text ──
  // Both are rendered separately (SQL via toggle, data in table below)

  function stripCodeBlocks(text) {
    // Remove ```lang\n...\n``` and bare ```...``` blocks
    let out = text.replace(/```[\w]*\n[\s\S]*?```/g, '').replace(/```[\s\S]*?```/g, '');
    // Remove markdown table lines (lines starting with |)
    out = out.split('\n').filter(l => !l.trim().startsWith('|')).join('\n');
    // Collapse 3+ blank lines to 2
    return out.replace(/\n{3,}/g, '\n\n').trim();
  }

  // ── Minimal markdown → HTML ──────────────────────────────

  function md(text) {
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const inline = raw => esc(raw)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,     '<em>$1</em>')
      .replace(/`([^`]+)`/g,     '<code style="background:#f0f0f5;padding:1px 4px;border-radius:3px;font-size:11px">$1</code>');

    const lines = text.split('\n');
    const out = [];
    let listType = null;
    let tableRows = [];

    const flushList = () => {
      if (listType) { out.push(`</${listType}>`); listType = null; }
    };

    const flushTable = () => {
      if (!tableRows.length) return;
      out.push('<table style="border-collapse:collapse;width:100%;font-size:11.5px;margin:.4em 0">');
      let firstRow = true;
      tableRows.forEach(row => {
        const cells = row.split('|').slice(1, -1).map(c => c.trim());
        if (firstRow) {
          out.push('<thead><tr>' + cells.map(c =>
            `<th style="background:#f5f5fa;padding:4px 8px;text-align:left;border-bottom:1px solid #e0e0e8;font-weight:600;color:#555;white-space:nowrap">${inline(c)}</th>`
          ).join('') + '</tr></thead><tbody>');
          firstRow = false;
        } else {
          out.push('<tr>' + cells.map(c =>
            `<td style="padding:3px 8px;border-bottom:1px solid #f0f0f5;color:#333">${inline(c)}</td>`
          ).join('') + '</tr>');
        }
      });
      out.push('</tbody></table>');
      tableRows = [];
    };

    for (const line of lines) {
      const trimmed = line.trim();
      const isTableRow = trimmed.startsWith('|') && trimmed.endsWith('|');
      const isSepRow  = /^\|[\s\-:|]+\|$/.test(trimmed);

      if (isSepRow)  { continue; } // skip `|---|---|` separator rows
      if (isTableRow){ flushList(); tableRows.push(trimmed); continue; }

      flushTable();

      const h3 = line.match(/^###\s+(.*)/);
      const h2 = line.match(/^##\s+(.*)/);
      const h1 = line.match(/^#\s+(.*)/);
      const ol = line.match(/^(\d+)\.\s+(.*)/);
      const ul = line.match(/^[-*]\s+(.*)/);

      if (h1) {
        flushList();
        out.push(`<div style="font-weight:700;font-size:14px;margin:.6em 0 .2em;color:#111">${inline(h1[1])}</div>`);
      } else if (h2) {
        flushList();
        out.push(`<div style="font-weight:700;font-size:13px;margin:.5em 0 .2em;color:#222">${inline(h2[1])}</div>`);
      } else if (h3) {
        flushList();
        out.push(`<div style="font-weight:600;font-size:12px;margin:.4em 0 .2em;color:#333">${inline(h3[1])}</div>`);
      } else if (ol) {
        if (listType !== 'ol') { flushList(); out.push('<ol style="margin:.4em 0 .4em 1.4em;padding:0">'); listType = 'ol'; }
        out.push(`<li>${inline(ol[2])}</li>`);
      } else if (ul) {
        if (listType !== 'ul') { flushList(); out.push('<ul style="margin:.4em 0 .4em 1.4em;padding:0">'); listType = 'ul'; }
        out.push(`<li>${inline(ul[1])}</li>`);
      } else {
        flushList();
        out.push(line === '' ? '<br>' : `<span>${inline(line)}</span><br>`);
      }
    }
    flushList();
    flushTable();

    return out.join('').replace(/^(<br>)+/, '').replace(/(<br>)+$/, '');
  }

  // ── Chart helpers ────────────────────────────────────────

  const CHART_COLORS = ['#7262ff','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8'];

  function detectChart(columns, data) {
    if (!data || data.length < 2) return null;
    const s = data[0];

    const isDateVal = v => typeof v === 'string' && /^\d{4}-\d{2}/.test(v);
    const isNumVal  = v => typeof v === 'number';
    const isStrVal  = v => typeof v === 'string' && !/^\d{4}-\d{2}/.test(v);

    const dateCols = columns.filter(c => isDateVal(s[c]));
    const numCols  = columns.filter(c => isNumVal(s[c]));
    const strCols  = columns.filter(c => isStrVal(s[c]));

    // 4+ columns — too complex for a chart
    if (columns.length > 3) return null;

    // Grouped bar: exactly date + 1 category + 1 numeric (e.g. month × city × revenue)
    if (dateCols.length === 1 && strCols.length === 1 && numCols.length === 1) {
      return { type: 'bar_grouped', xCol: dateCols[0], groupCol: strCols[0], yCol: numCols[0] };
    }

    // Time series: date x-axis, up to 2 numeric y-series
    if (dateCols.length === 1 && numCols.length >= 1) {
      return { type: 'line', xCol: dateCols[0], yCols: numCols.slice(0, 2) };
    }

    // Bar chart: single categorical x-axis
    if (strCols.length === 1 && numCols.length >= 1 && dateCols.length === 0 && data.length <= 25) {
      return { type: 'bar', xCol: strCols[0], yCol: numCols[0] };
    }

    return null;
  }

  function renderChart(columns, data) {
    const spec = detectChart(columns, data);
    if (!spec || typeof Plotly === 'undefined') return null;

    const el = document.createElement('div');
    el.className = 'chart-wrap';

    const layout = {
      margin: { t: 10, r: 20, b: 50, l: 55 },
      height: 185,
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor:  'rgba(0,0,0,0)',
      font: { size: 10, color: '#555' },
      xaxis: { tickfont: { size: 9 }, tickangle: -30 },
      yaxis: { tickfont: { size: 9 }, gridcolor: '#ebebf0' },
      showlegend: false,
    };
    const config = {
      responsive: true,
      displayModeBar: 'hover',   // show on hover only
      modeBarButtons: [['resetScale2d']],  // only the reset button
      scrollZoom: false,
      doubleClick: 'reset',      // double-click anywhere to reset
    };

    let traces = [];

    if (spec.type === 'line') {
      traces = spec.yCols.map((yCol, i) => ({
        x: data.map(r => r[spec.xCol]),
        y: data.map(r => r[yCol]),
        type: 'scatter', mode: 'lines+markers',
        name: yCol,
        line: { color: CHART_COLORS[i], width: 2 },
        marker: { color: CHART_COLORS[i], size: 5 },
      }));
      if (traces.length > 1) { layout.showlegend = true; layout.legend = { font: { size: 9 }, orientation: 'h', x: 0, y: 1.05, xanchor: 'left', yanchor: 'bottom' }; layout.margin.t = 32; }
    }

    if (spec.type === 'bar_grouped') {
      const groups = [...new Set(data.map(r => r[spec.groupCol]))];
      traces = groups.map((g, i) => {
        const rows = data.filter(r => r[spec.groupCol] === g);
        return {
          x: rows.map(r => r[spec.xCol]),
          y: rows.map(r => r[spec.yCol]),
          name: g, type: 'bar',
          marker: { color: CHART_COLORS[i % CHART_COLORS.length] },
        };
      });
      layout.barmode = 'group';
      layout.showlegend = true;
      layout.legend = { font: { size: 9 }, orientation: 'h', x: 0, y: 1.05, xanchor: 'left', yanchor: 'bottom' };
      layout.margin.t = 32;
    }

    if (spec.type === 'bar') {
      traces = [{
        x: data.map(r => r[spec.xCol]),
        y: data.map(r => r[spec.yCol]),
        type: 'bar',
        marker: { color: CHART_COLORS[0] },
      }];
    }

    Plotly.newPlot(el, traces, layout, config);
    return el;
  }

  // ── Response renderer ────────────────────────────────────

  function renderResult(result) {
    const wrap = document.createElement('div');

    // Chart first (explore only)
    if (result.data && result.data.length >= 2 && result.columns) {
      const chartEl = renderChart(result.columns, result.data);
      if (chartEl) wrap.appendChild(chartEl);
    }

    // Text answer (markdown rendered, code blocks + table lines stripped)
    const textEl = document.createElement('div');
    textEl.innerHTML = md(stripCodeBlocks(result.text));
    wrap.appendChild(textEl);

    // SQL collapsible (explore only)
    if (result.sql) {
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'sql-toggle';
      toggleBtn.textContent = '▶ view sql';

      const codeEl = document.createElement('pre');
      codeEl.className = 'sql-code';
      codeEl.textContent = result.sql;

      toggleBtn.onclick = () => {
        const open = codeEl.style.display === 'block';
        codeEl.style.display = open ? 'none' : 'block';
        toggleBtn.textContent = open ? '▶ view sql' : '▼ hide sql';
      };

      wrap.appendChild(toggleBtn);
      wrap.appendChild(codeEl);
    }

    // Data table (explore only)
    if (result.data && result.data.length > 0 && result.columns) {
      const tableWrap = document.createElement('div');
      tableWrap.className = 'data-table-wrap';

      const table = document.createElement('table');
      table.className = 'data-table';

      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      result.columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      result.data.forEach(row => {
        const tr = document.createElement('tr');
        result.columns.forEach(col => {
          const td = document.createElement('td');
          const val = row[col];
          if (val === null || val === undefined) {
            td.textContent = '—';
          } else if (typeof val === 'number') {
            td.textContent = Number.isInteger(val) ? val.toLocaleString()
              : val.toLocaleString(undefined, { maximumFractionDigits: 2 });
          } else {
            td.textContent = val;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.appendChild(table);
      wrap.appendChild(tableWrap);

      const countEl = document.createElement('div');
      countEl.className = 'row-count';
      countEl.textContent = `${result.row_count} row${result.row_count !== 1 ? 's' : ''}`;
      wrap.appendChild(countEl);

      const csvBtn = document.createElement('button');
      csvBtn.className = 'csv-btn';
      csvBtn.textContent = '⬇ Export CSV';
      csvBtn.onclick = () => exportCSV(result.columns, result.data);
      wrap.appendChild(csvBtn);
    }

    // Feedback buttons — bottom, after user has seen the data
    if (result.intent === 'explore' && result.sql) {
      const fbWrap = document.createElement('div');
      fbWrap.className = 'feedback-wrap';

      const label = document.createElement('span');
      label.className = 'feedback-label';
      label.textContent = 'Was this helpful?';

      const upBtn = document.createElement('button');
      upBtn.className = 'feedback-btn';
      upBtn.textContent = '👍';
      upBtn.title = 'Good answer — save as training example';

      const downBtn = document.createElement('button');
      downBtn.className = 'feedback-btn';
      downBtn.textContent = '👎';
      downBtn.title = 'Wrong answer — flag for review';

      const userBubbles = document.querySelectorAll('.msg.user');
      const question = userBubbles.length ? userBubbles[userBubbles.length - 1].textContent : '';

      upBtn.onclick   = () => sendFeedback(question, result.sql, 'up',   fbWrap);
      downBtn.onclick = () => sendFeedback(question, result.sql, 'down', fbWrap);

      fbWrap.appendChild(label);
      fbWrap.appendChild(upBtn);
      fbWrap.appendChild(downBtn);
      wrap.appendChild(fbWrap);
    }

    return wrap;
  }

  // ── Feedback ─────────────────────────────────────────────

  async function sendFeedback(question, sql, rating, wrap) {
    const btns = wrap.querySelectorAll('.feedback-btn');
    btns.forEach(b => b.disabled = true);

    try {
      await fetch('/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, sql, rating }),
      });
      const label = wrap.querySelector('.feedback-label');
      label.textContent = rating === 'up' ? 'Thanks! Saved as a good example.' : 'Noted. We\'ll review it.';
      label.style.color = rating === 'up' ? '#6bcb77' : '#e67e00';
    } catch (e) {
      console.error('Feedback error', e);
    }
  }

  // ── CSV export ───────────────────────────────────────────

  function exportCSV(columns, data) {
    const escape = v => {
      const s = (v === null || v === undefined) ? '' : String(v);
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? `"${s.replace(/"/g, '""')}"` : s;
    };
    const rows = [columns.map(escape).join(',')];
    data.forEach(row => rows.push(columns.map(col => escape(row[col])).join(',')));
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'export.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  // ── Send message ─────────────────────────────────────────

  function showSessionBanner(msg, color) {
    const banner = document.createElement('div');
    banner.style.cssText = `font-size:11px;color:${color};background:${color}18;border:1px solid ${color}55;border-radius:6px;padding:5px 8px;text-align:center;margin:2px 0`;
    banner.textContent = msg;
    document.getElementById('messages').appendChild(banner);
    scrollToBottom();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const question = input.value.trim();
    if (!question || exchangeCount >= MAX_EXCHANGES) return;

    input.value = '';
    input.disabled = true;
    sendBtn.disabled = true;
    document.getElementById('send-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'block';

    appendMessage('user', question);
    const typingBubble = showTyping();

    currentAbort = new AbortController();

    let atLimit = false;
    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: question, session_id: sessionId }),
        signal: currentAbort.signal,
      });

      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const result = await resp.json();

      typingBubble.remove();
      sessionId = result.session_id;
      const bubble = appendMessage('assistant', renderResult(result));
      requestAnimationFrame(() => {
        bubble.querySelectorAll('.chart-wrap').forEach(el => Plotly.Plots.resize(el));
      });

      // Increment only on success
      exchangeCount++;

      if (exchangeCount >= MAX_EXCHANGES) {
        showSessionBanner('Session limit reached. Please refresh the page to start a new session.', '#cc3333');
        atLimit = true;
      } else if (exchangeCount === MAX_EXCHANGES - 1) {
        showSessionBanner('⚠ 1 message remaining in this session. Refresh to start a new session.', '#e67e00');
      }
    } catch (err) {
      typingBubble.remove();
      if (err.name === 'AbortError') {
        // User stopped — restore input so they can edit and resend
        input.value = question;
      } else {
        appendMessage('assistant', 'Something went wrong. Please try again.');
        console.error(err);
      }
    } finally {
      currentAbort = null;
      document.getElementById('stop-btn').style.display = 'none';
      document.getElementById('send-btn').style.display = '';
    }

    if (atLimit) {
      input.disabled = true;
      sendBtn.disabled = true;
    } else {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function stopRequest() {
    if (currentAbort) {
      currentAbort.abort();
    }
  }
</script>
