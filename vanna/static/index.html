<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

<div id="widget">
  <div id="chat-panel">
    <div class="panel-header">
      <span>✦ Ask your data</span>
      <div style="display:flex;gap:2px;align-items:center">
        <button id="expand-btn" onclick="toggleSidePanel()" title="Expand to side panel">
          <svg id="expand-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <polyline points="8,1 12,1 12,5"/><line x1="12" y1="1" x2="7" y2="6"/>
            <polyline points="5,12 1,12 1,8"/><line x1="1" y1="12" x2="6" y2="7"/>
          </svg>
        </button>
        <button id="close-btn" onclick="togglePanel()" title="Close">&#x2715;</button>
      </div>
    </div>
    <div id="messages"></div>
    <div class="split-input">
      <div class="split-pane" id="explore-pane">
        <div class="split-label">exploration</div>
        <div class="split-controls">
          <input id="user-input" type="text" placeholder="Ask a question…"
                 onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }">
          <button id="send-btn" onclick="sendMessage()">Send</button>
          <button id="stop-btn" onclick="stopRequest()">■ Stop</button>
        </div>
      </div>
      <div class="split-pane" id="dashboard-pane">
        <div class="split-label">dashboard</div>
        <div class="split-controls" id="dash-idle">
          <button id="save-dashboard-btn" onclick="startDashboard()" disabled title="Explore data first, then save as dashboard">Save as Dashboard</button>
        </div>
        <div class="split-controls" id="dash-active" style="display:none">
          <input id="dpm-input" type="text" placeholder="Your answer…"
                 onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendDPMInput(); }">
          <button id="dpm-send-btn" onclick="sendDPMInput()">→</button>
        </div>
      </div>
    </div>
  </div>

  <button id="chat-btn" onclick="togglePanel()" title="Ask your data">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
         stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
</div>

<script src="static/app.js"></script>
<script>
  // Embedded mode: when loaded inside the Lightdash widget panel (?embedded=1)
  // auto-open the chat and hide the toggle button + expand button.
  if (new URLSearchParams(window.location.search).get('embedded') === '1') {
    document.getElementById('chat-panel').classList.add('open');
    document.getElementById('chat-btn').style.display = 'none';
    document.getElementById('expand-btn').style.display = 'none';
    document.getElementById('close-btn').style.display = 'none';
    document.body.classList.add('embedded');
  }
</script>

</body>
</html>
