# nginx sits in front of Lightdash and injects the Vanna chat widget into every page.
# WebSocket support is required for Lightdash live updates.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ── Vanna widget script ──────────────────────────────────────────
    location = /vanna-widget.js {
        proxy_pass http://vanna:8084/static/widget.js;
        proxy_set_header Host $host;
    }

    # ── Vanna app (chat UI inside panel iframe) ──────────────────────
    location /vanna/ {
        proxy_pass         http://vanna:8084/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # dashboard/build runs multiple LLM calls + Docker deploy
        proxy_send_timeout 300s;
    }

    # ── Lightdash (with widget injected) ────────────────────────────
    location / {
        proxy_pass         http://lightdash:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        # Lightdash sends large headers (JWT/session cookies)
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # Disable gzip so sub_filter can rewrite the HTML body
        proxy_set_header   Accept-Encoding   "";

        # Inject widget script before </body> on every Lightdash HTML page
        sub_filter         '</body>' '<script src="/vanna-widget.js"></script></body>';
        sub_filter_once    on;
        sub_filter_types   text/html;
    }
}
