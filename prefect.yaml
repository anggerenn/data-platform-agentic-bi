name: analytics-pipeline
prefect-version: 3.4.25

build: null
push: null
pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/anggerenn/data-platform.git
      branch: main

deployments:
  - name: analytics-pipeline
    entrypoint: prefect/flows/main_pipeline.py:analytics_pipeline
    schedule: null
    work_pool:
      name: default-pool

  - name: lightdash-sync
    entrypoint: prefect/flows/lightdash_sync.py:lightdash_sync
    schedule:
      interval: 900  # every 15 minutes
    work_pool:
      name: default-pool